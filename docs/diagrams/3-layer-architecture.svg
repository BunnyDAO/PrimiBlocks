<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .layer-label { font-size: 14px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; fill: #475569; }
      .layer-sub   { font-size: 13px; fill: #64748b; }
      .node-label  { font-size: 16px; font-weight: 600; fill: #0f172a; }
      .node-sub    { font-size: 12px; fill: #475569; }
      .arrow       { stroke: #475569; stroke-width: 1.6; fill: none; }
      .keep-badge  { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; fill: #15803d; }
      .replace-badge { font-size: 11px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; fill: #ffffff; }
      .replace-banner-text { font-size: 12.5px; font-weight: 700; fill: #ffffff; }
    </style>
  </defs>

  <rect width="1200" height="780" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">PrimiBlocks — three-layer architecture</text>
  <text x="600" y="68" text-anchor="middle" font-size="13" fill="#64748b">Skills and Renderer are the framework (you keep). Templates and Primitives are <tspan font-weight="700" fill="#c2410c">YOUR domain kit</tspan> — what's shown below is the bundled REFERENCE EXAMPLE.</text>

  <!-- Legend strip -->
  <g transform="translate(80, 90)">
    <rect x="0" y="0" width="320" height="26" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1.2"/>
    <text x="14" y="18" class="keep-badge">■ Framework — you keep as-is</text>
    <rect x="340" y="0" width="380" height="26" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/>
    <text x="354" y="18" class="keep-badge" fill="#b45309">■ kit/ — reference example, REPLACE WITH YOUR DOMAIN</text>
  </g>

  <!-- Layer 3: Skills (FRAMEWORK — keep) -->
  <g transform="translate(80, 140)">
    <rect x="0" y="0" width="1040" height="120" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.4"/>
    <text x="20" y="26" class="layer-label" fill="#5b21b6">Layer 3 · Skills</text>
    <g transform="translate(380, 8)">
      <rect width="120" height="20" rx="4" fill="#16a34a"/>
      <text x="60" y="14" text-anchor="middle" class="replace-badge">Framework · keep</text>
    </g>
    <text x="20" y="46" class="layer-sub">Claude Code skills the user invokes. Wrap the CLI in conversational walkthroughs.</text>

    <g transform="translate(80, 60)" filter="url(#shadow)">
      <rect width="380" height="48" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.4"/>
      <text x="20" y="22" class="node-label">/primi-fill</text>
      <text x="20" y="40" class="node-sub">Walk a template's vars; render; preview; write.</text>
    </g>
    <g transform="translate(580, 60)" filter="url(#shadow)">
      <rect width="380" height="48" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.4"/>
      <text x="20" y="22" class="node-label">/primi-author</text>
      <text x="20" y="40" class="node-sub">Compose a new template from primitives, or file a request.</text>
    </g>
  </g>

  <!-- "YOUR KIT" wrapper around Templates + Primitives -->
  <g transform="translate(60, 290)">
    <!-- Dashed wrapper -->
    <rect x="0" y="0" width="1080" height="320" rx="14" fill="none" stroke="#d97706" stroke-width="2.5" stroke-dasharray="10 5"/>
    <!-- Big "REPLACE THIS" banner -->
    <rect x="0" y="0" width="1080" height="32" rx="14" fill="#d97706"/>
    <rect x="0" y="14" width="1080" height="18" fill="#d97706"/>
    <text x="540" y="22" text-anchor="middle" class="replace-banner-text">kit/  ·  REFERENCE EXAMPLE — YOUR FORK REPLACES THIS WITH YOUR DOMAIN'S TEMPLATES AND PRIMITIVES</text>
  </g>

  <!-- Layer 2: Templates (kit/ — EXAMPLE) -->
  <g transform="translate(80, 340)">
    <rect x="0" y="0" width="1040" height="120" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.4"/>
    <text x="20" y="26" class="layer-label" fill="#1d4ed8">Layer 2 · Templates</text>
    <g transform="translate(310, 8)">
      <rect width="160" height="20" rx="4" fill="#d97706"/>
      <text x="80" y="14" text-anchor="middle" class="replace-badge">example · replace</text>
    </g>
    <text x="20" y="46" class="layer-sub">Each template lists `primitives: [...]` + own vars. Effective contract aggregates both; template wins on collision.</text>

    <g transform="translate(40, 60)" filter="url(#shadow)">
      <rect width="300" height="48" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.4" stroke-dasharray="4 2"/>
      <text x="14" y="22" class="node-label" font-size="14">rag-qa-prompt <tspan font-size="11" fill="#94a3b8">(example)</tspan></text>
      <text x="14" y="40" class="node-sub">persona + retrieval + task + md</text>
    </g>
    <g transform="translate(370, 60)" filter="url(#shadow)">
      <rect width="300" height="48" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.4" stroke-dasharray="4 2"/>
      <text x="14" y="22" class="node-label" font-size="14">agent-tool-using-prompt <tspan font-size="11" fill="#94a3b8">(example)</tspan></text>
      <text x="14" y="40" class="node-sub">persona + task + tools + json + guard</text>
    </g>
    <g transform="translate(700, 60)" filter="url(#shadow)">
      <rect width="300" height="48" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.4" stroke-dasharray="4 2"/>
      <text x="14" y="22" class="node-label" font-size="14">eval-judge-prompt <tspan font-size="11" fill="#94a3b8">(example)</tspan></text>
      <text x="14" y="40" class="node-sub">persona + task + few_shot + json</text>
    </g>
  </g>

  <!-- Layer 1: Primitives (kit/ — EXAMPLE) -->
  <g transform="translate(80, 480)">
    <rect x="0" y="0" width="1040" height="120" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.4"/>
    <text x="20" y="26" class="layer-label" fill="#15803d">Layer 1 · Primitives</text>
    <g transform="translate(310, 8)">
      <rect width="160" height="20" rx="4" fill="#d97706"/>
      <text x="80" y="14" text-anchor="middle" class="replace-badge">example · replace</text>
    </g>
    <text x="20" y="46" class="layer-sub">Atomic Jinja2 fragments. Each carries its own contract. Variables bubble up into the composing template's effective contract.</text>

    <g transform="translate(28, 62)">
      <g transform="translate(0, 0)"><rect width="190" height="28" rx="6" fill="#fff" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="4 2"/><text x="10" y="19" class="node-label" font-size="12">system_persona <tspan font-size="10" fill="#94a3b8">(ex)</tspan></text></g>
      <g transform="translate(200, 0)"><rect width="190" height="28" rx="6" fill="#fff" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="4 2"/><text x="10" y="19" class="node-label" font-size="12">task_instruction <tspan font-size="10" fill="#94a3b8">(ex)</tspan></text></g>
      <g transform="translate(400, 0)"><rect width="190" height="28" rx="6" fill="#fff" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="4 2"/><text x="10" y="19" class="node-label" font-size="12">retrieval_block <tspan font-size="10" fill="#94a3b8">(ex)</tspan></text></g>
      <g transform="translate(600, 0)"><rect width="190" height="28" rx="6" fill="#fff" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="4 2"/><text x="10" y="19" class="node-label" font-size="12">tool_use_examples <tspan font-size="10" fill="#94a3b8">(ex)</tspan></text></g>
      <g transform="translate(800, 0)"><rect width="190" height="28" rx="6" fill="#fff" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="4 2"/><text x="10" y="19" class="node-label" font-size="12">output_format_json <tspan font-size="10" fill="#94a3b8">(ex)</tspan></text></g>

      <g transform="translate(0, 34)"><rect width="190" height="22" rx="6" fill="#fff" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="4 2"/><text x="10" y="16" class="node-label" font-size="11">output_format_markdown</text></g>
      <g transform="translate(200, 34)"><rect width="190" height="22" rx="6" fill="#fff" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="4 2"/><text x="10" y="16" class="node-label" font-size="11">few_shot_block</text></g>
      <g transform="translate(400, 34)"><rect width="190" height="22" rx="6" fill="#fff" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="4 2"/><text x="10" y="16" class="node-label" font-size="11">guardrail_refusal</text></g>
      <g transform="translate(600, 34)"><rect width="390" height="22" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.4"/><text x="10" y="16" font-size="12" fill="#9a3412" font-weight="700">↑ ALL OF THESE: REPLACE WITH YOUR OWN PRIMITIVES</text></g>
    </g>
  </g>

  <!-- Renderer + artifact (FRAMEWORK — keep) -->
  <g transform="translate(80, 640)">
    <rect x="0" y="0" width="1040" height="100" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="1.4"/>
    <text x="20" y="26" class="layer-label" fill="#c2410c">Renderer + Artifact</text>
    <g transform="translate(310, 8)">
      <rect width="120" height="20" rx="4" fill="#16a34a"/>
      <text x="60" y="14" text-anchor="middle" class="replace-badge">Framework · keep</text>
    </g>
    <text x="20" y="46" class="layer-sub">primiblocks render &lt;template&gt; --vars vars.json  →  validate effective contract  →  Jinja2 → artifact (any text).</text>
    <g transform="translate(740, 38)" filter="url(#shadow)">
      <rect width="280" height="48" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.4"/>
      <text x="20" y="22" class="node-label">Artifact</text>
      <text x="20" y="40" class="node-sub">.md / .json / .yml / .py / ... — your call.</text>
    </g>
  </g>

  <!-- Vertical arrows linking layers -->
  <path class="arrow" marker-end="url(#arrow)" d="M 600 262 L 600 296"/>
  <path class="arrow" marker-end="url(#arrow)" d="M 600 462 L 600 478"/>
  <path class="arrow" marker-end="url(#arrow)" d="M 600 602 L 600 638"/>
</svg>
